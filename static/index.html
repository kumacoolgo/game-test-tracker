<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Test Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Login Modal -->
        <div id="login-modal" class="modal">
            <div class="modal-content">
                <h2>Login</h2>
                <form id="login-form">
                    <input type="text" id="login-username" placeholder="Username" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <p id="login-error" class="error"></p>
            </div>
        </div>

        <!-- Edit Modal -->
        <div id="edit-modal" class="modal">
            <div class="modal-content">
                <h2 id="modal-title">New Task</h2>
                <form id="task-form">
                    <input type="hidden" id="task-id">
                    <input type="text" id="task-title" placeholder="Title" required>
                    <textarea id="task-desc" placeholder="Description"></textarea>
                    <select id="task-status">
                        <option value="pending">Pending</option>
                        <option value="in_progress">In Progress</option>
                        <option value="passed">Passed</option>
                        <option value="failed">Failed</option>
                    </select>
                    <select id="task-priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                    <div class="modal-actions">
                        <button type="submit" class="btn-primary">Save</button>
                        <button type="button" id="cancel-edit" class="btn-secondary">Cancel</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <header>
            <h1>Game Test Tracker</h1>
            <div id="auth-section">
                <button id="btn-login" class="btn">Login</button>
                <button id="btn-logout" class="btn" style="display:none;">Logout</button>
                <span id="username-display"></span>
            </div>
        </header>

        <div id="toolbar">
            <button id="btn-new" class="btn btn-primary" disabled>New</button>
            <button id="btn-edit" class="btn" disabled>Edit</button>
            <button id="btn-delete" class="btn btn-danger" disabled>Delete</button>
            <button id="btn-up" class="btn" disabled>Up</button>
            <button id="btn-down" class="btn" disabled>Down</button>
        </div>

        <div id="task-grid">
            <div class="grid-header">
                <div class="grid-cell col-id">#</div>
                <div class="grid-cell col-title">Title</div>
                <div class="grid-cell col-status">Status</div>
                <div class="grid-cell col-priority">Priority</div>
                <div class="grid-cell col-order">Order</div>
            </div>
            <div id="grid-body"></div>
        </div>

        <p id="status-message"></p>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
