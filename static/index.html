<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Test Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <!-- Edit Modal -->
        <div id="edit-modal" class="modal">
            <div class="modal-content">
                <h2 id="modal-title">新建记录</h2>
                <form id="task-form">
                    <input type="hidden" id="task-id">

                    <div class="form-row">
                        <div class="form-group flex-2">
                            <label>任务名称</label>
                            <input type="text" id="task-name" placeholder="任务名称" required>
                        </div>
                        <div class="form-group flex-1">
                            <label>发布者</label>
                            <input type="text" id="task-publisher" placeholder="发布者">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>游戏名称</label>
                            <input type="text" id="task-game-title" placeholder="游戏名称">
                        </div>
                        <div class="form-group flex-2">
                            <label>游戏包链接</label>
                            <input type="text" id="task-gamepack-url" placeholder="https://...">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>开始日期</label>
                            <input type="date" id="task-start-date">
                        </div>
                        <div class="form-group">
                            <label>结束日期</label>
                            <input type="date" id="task-end-date">
                        </div>
                        <div class="form-group">
                            <label>测试时长(h)</label>
                            <input type="number" id="task-total-testing-time" step="0.01" min="0">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>测试用例</label>
                            <textarea id="task-test-cases" placeholder="测试用例描述" rows="2"></textarea>
                        </div>
                        <div class="form-group flex-1">
                            <label>测试结果</label>
                            <textarea id="task-test-results" placeholder="测试结果" rows="2"></textarea>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>报酬金额(¥)</label>
                            <input type="number" id="task-reward-amount" step="0.01" min="0">
                        </div>
                        <div class="form-group">
                            <label>成本(¥)</label>
                            <input type="number" id="task-payment-cost" step="0.01" min="0">
                        </div>
                        <div class="form-group">
                            <label>到账日期</label>
                            <input type="date" id="task-payment-received-date">
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button type="submit" class="btn-primary">保存</button>
                        <button type="button" id="cancel-edit" class="btn-secondary">取消</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <header>
            <h1>Game Test Tracker</h1>
        </header>

        <div id="toolbar">
            <button id="btn-new" class="btn btn-primary">新建</button>
            <button id="btn-edit" class="btn" disabled>编辑</button>
            <button id="btn-delete" class="btn btn-danger" disabled>删除</button>
            <button id="btn-up" class="btn" disabled>上移</button>
            <button id="btn-down" class="btn" disabled>下移</button>
        </div>

        <div id="task-grid">
            <div class="grid-header">
                <div class="grid-cell col-id">#</div>
                <div class="grid-cell col-name">任务</div>
                <div class="grid-cell col-game">游戏</div>
                <div class="grid-cell col-reward">报酬</div>
                <div class="grid-cell col-cost">成本</div>
                <div class="grid-cell col-profit">利润</div>
                <div class="grid-cell col-received">到账</div>
            </div>
            <div id="grid-body"></div>
        </div>

        <p id="status-message"></p>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
